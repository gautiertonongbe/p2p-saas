    <script>
    (function() {
      var presets = {
        blue:"221 83% 53%",violet:"262 80% 58%",emerald:"158 64% 40%",
        rose:"346 77% 53%",orange:"24 95% 50%",teal:"187 76% 40%",
        indigo:"239 84% 60%",amber:"43 96% 48%",slate:"215 25% 35%",
        pink:"330 81% 55%",cyan:"192 91% 42%",lime:"85 78% 38%"
      };
      var id = localStorage.getItem("colorPreset") || "blue";
      var p = presets[id] || presets.blue;
      var r = document.documentElement;
      r.setAttribute("data-color", id);
      r.style.setProperty("--primary", p);
      r.style.setProperty("--ring", p);
      r.style.setProperty("--sidebar-accent", p);
      r.style.setProperty("--sidebar-accent-foreground", "0 0% 100%");
    })();
  </script>
